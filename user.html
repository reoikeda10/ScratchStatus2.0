<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug User Stats - ScratchStats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div class="max-w-md mx-auto px-6 py-12">
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 mb-8 hover:text-white transition">
            <i data-lucide="arrow-left" size="20"></i> 戻る
        </a>

        <div id="loading-area" class="text-center py-10">
            <div class="animate-spin inline-block text-orange-500 mb-4"><i data-lucide="loader-2" size="40"></i></div>
            <p id="status-text" class="text-slate-400">APIに接続中...</p>
        </div>

        <div id="debug-log" class="hidden bg-black/50 p-4 rounded-xl mb-6 font-mono text-[10px] text-green-400 border border-white/10">
            <!-- 診断ログがここに出ます -->
        </div>

        <div id="error-area" class="hidden text-center">
            <div class="bg-red-500/10 border border-red-500/50 p-6 rounded-3xl mb-6">
                <i data-lucide="alert-circle" class="text-red-500 mx-auto mb-3" size="32"></i>
                <h2 class="text-xl font-bold text-red-500 mb-2">ユーザーが見つかりません</h2>
                <p id="error-detail" class="text-slate-400 text-sm italic">詳細なエラーメッセージ</p>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-800 rounded-2xl font-bold hover:bg-slate-700 transition">再読み込みを試す</button>
        </div>

        <div id="result-area" class="hidden">
            <div class="bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-white/5 text-center">
                <img id="avatar" src="" class="w-32 h-32 rounded-[2rem] mx-auto mb-6 shadow-xl border-4 border-slate-700 bg-slate-700">
                <h2 id="display-name" class="text-3xl font-black mb-2 tracking-tight text-white">---</h2>
                <div class="flex justify-center gap-2 mb-6">
                    <span id="country-badge" class="bg-white/10 px-3 py-1 rounded-full text-xs font-bold text-slate-300 tracking-wider uppercase">---</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 text-left">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-1">Followers</p>
                        <p id="stat-followers" class="text-xl font-bold">---</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">Views</p>
                        <p id="stat-views" class="text-xl font-bold">---</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const log = (msg) => {
            const el = document.getElementById('debug-log');
            el.classList.remove('hidden');
            el.innerHTML += `<div>> ${msg}</div>`;
        };

        const params = new URLSearchParams(window.location.search);
        const user = params.get('u');

        async function startSearch() {
            if (!user) {
                document.getElementById('status-text').textContent = "ユーザー名が指定されていません";
                return;
            }

            log(`Searching for: ${user}`);
            
            try {
                // 1. まず本家API
                log(`Connecting to api.scratch.mit.edu...`);
                const res1 = await fetch(`https://api.scratch.mit.edu/users/${user}`);
                if (!res1.ok) {
                    throw new Error(`公式APIで見つかりません (${res1.status})`);
                }
                const data1 = await res1.json();
                log(`User found on Official API! ID: ${data1.id}`);

                // 2. 次に統計API
                log(`Connecting to scratchdb.lefty.one...`);
                let followers = "---";
                let views = "---";
                try {
                    const res2 = await fetch(`https://scratchdb.lefty.one/v3/user/info/${user}`);
                    if (res2.ok) {
                        const data2 = await res2.json();
                        followers = data2.statistics.followers.toLocaleString();
                        views = data2.statistics.views.toLocaleString();
                        log(`Stats loaded from ScratchDB.`);
                    } else {
                        log(`ScratchDB returned error. Using partial data.`);
                    }
                } catch (e) {
                    log(`ScratchDB connection failed. Continuing...`);
                }

                // 表示
                document.getElementById('avatar').src = `https://uploads.scratch.mit.edu/get_image/user/${data1.id}_90x90.png`;
                document.getElementById('display-name').textContent = data1.username;
                document.getElementById('country-badge').textContent = data1.profile.country || "Unknown";
                document.getElementById('stat-followers').textContent = followers;
                document.getElementById('stat-views').textContent = views;

                document.getElementById('loading-area').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
                lucide.createIcons();

            } catch (err) {
                log(`Fatal Error: ${err.message}`);
                document.getElementById('loading-area').classList.add('hidden');
                document.getElementById('error-area').classList.remove('hidden');
                document.getElementById('error-detail').textContent = err.message;
            }
        }

        startSearch();
    </script>
</body>
</html>
