<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - ScratchStats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f0f2f5] text-slate-900 min-h-screen">

    <!-- ナビゲーション -->
    <nav class="p-4 flex items-center justify-between max-w-2xl mx-auto">
        <a href="index.html" class="p-2 hover:bg-white rounded-full transition shadow-sm">
            <i data-lucide="chevron-left"></i>
        </a>
        <h1 class="font-extrabold text-lg tracking-tight">ユーザー統計</h1>
        <div class="w-10"></div> <!-- スペーサー -->
    </nav>

    <main class="max-w-2xl mx-auto px-4 pb-12">
        <!-- ローディング画面 -->
        <div id="loading" class="py-20 text-center">
            <div class="inline-block animate-bounce mb-4 text-orange-500">
                <i data-lucide="database" size="40"></i>
            </div>
            <p class="text-slate-400 font-bold animate-pulse">データを読み込み中...</p>
        </div>

        <!-- エラー表示 -->
        <div id="error" class="hidden py-12 text-center">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-red-100">
                <i data-lucide="search-x" class="mx-auto text-red-400 mb-4" size="48"></i>
                <h2 class="text-xl font-extrabold mb-2">ユーザーが見つかりません</h2>
                <p class="text-slate-500 text-sm mb-6">正しいユーザー名を入力したか確認してください。<br>またはScratch側が混雑している可能性があります。</p>
                <a href="index.html" class="inline-block bg-orange-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-orange-200">もう一度検索する</a>
            </div>
        </div>

        <!-- ユーザーカード -->
        <div id="content" class="hidden space-y-4">
            <!-- プロフィール基本 -->
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border border-white text-center">
                <img id="avatar" src="" class="w-28 h-28 rounded-[2rem] mx-auto mb-6 shadow-lg border-4 border-white bg-slate-200">
                <h2 id="name" class="text-3xl font-extrabold mb-1 tracking-tight">---</h2>
                <div class="flex justify-center gap-2 mb-4">
                    <span id="country" class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">---</span>
                </div>
                <p id="joined" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest leading-none">---</p>
            </div>

            <!-- 統計数値 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-6 rounded-3xl border border-white">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Followers</p>
                    <p id="followers" class="text-2xl font-extrabold text-orange-500">---</p>
                </div>
                <div class="glass-card p-6 rounded-3xl border border-white">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Views</p>
                    <p id="views" class="text-2xl font-extrabold text-blue-500">---</p>
                </div>
                <div class="glass-card p-6 rounded-3xl border border-white">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Loves</p>
                    <p id="loves" class="text-2xl font-extrabold text-rose-500">---</p>
                </div>
                <div class="glass-card p-6 rounded-3xl border border-white">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Favorites</p>
                    <p id="favorites" class="text-2xl font-extrabold text-amber-500">---</p>
                </div>
            </div>

            <!-- その他情報 -->
            <div id="bio-card" class="glass-card p-6 rounded-3xl border border-white space-y-4">
                <div>
                    <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest mb-2">About Me</h3>
                    <p id="bio" class="text-sm text-slate-600 leading-relaxed italic">No info</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const user = params.get('u');

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // 1. 公式API (基本情報)
                const officialRes = await fetch(`https://api.scratch.mit.edu/users/${user}`);
                if (!officialRes.ok) throw new Error('Not Found');
                const officialData = await officialRes.json();

                // UI反映
                document.getElementById('name').textContent = officialData.username;
                document.getElementById('avatar').src = `https://uploads.scratch.mit.edu/get_image/user/${officialData.id}_90x90.png`;
                document.getElementById('country').textContent = officialData.profile.country || 'Unknown';
                document.getElementById('joined').textContent = `Joined ${officialData.history.joined.split('T')[0]}`;
                document.getElementById('bio').textContent = officialData.profile.bio || officialData.profile.status || 'No bio provided.';

                // 2. 統計API (ScratchDB)
                try {
                    const dbRes = await fetch(`https://scratchdb.lefty.one/v3/user/info/${user}`);
                    if (dbRes.ok) {
                        const dbData = await dbRes.json();
                        document.getElementById('followers').textContent = (dbData.statistics.followers || 0).toLocaleString();
                        document.getElementById('views').textContent = (dbData.statistics.views || 0).toLocaleString();
                        document.getElementById('loves').textContent = (dbData.statistics.loves || 0).toLocaleString();
                        document.getElementById('favorites').textContent = (dbData.statistics.favorites || 0).toLocaleString();
                    }
                } catch (e) {
                    console.log("Stats API error - fallback to dashes");
                }

                // 画面切り替え
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                lucide.createIcons();

            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        loadProfile();
    </script>
</body>
</html>
