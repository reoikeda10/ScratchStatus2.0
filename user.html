<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScratchStats - User Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto px-6 py-12">
        <header class="mb-8 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-orange-500 font-bold">
                <i data-lucide="arrow-left"></i> 戻る
            </a>
            <span class="text-xs text-slate-500 font-mono" id="debug-status">Initializing...</span>
        </header>

        <div id="loading" class="text-center py-20">
            <div class="animate-spin text-orange-500 inline-block mb-4"><i data-lucide="loader-2" size="40"></i></div>
            <p class="text-slate-400">通信を試行中...</p>
        </div>

        <!-- 診断ログパネル -->
        <div id="log-panel" class="bg-black/40 border border-white/10 p-4 rounded-xl mb-6 font-mono text-[10px] text-blue-300">
            <div class="text-white border-b border-white/10 pb-1 mb-1 font-bold">Diagnostic Log:</div>
            <div id="log-content"></div>
        </div>

        <div id="error-view" class="hidden text-center">
            <div class="bg-red-500/20 border border-red-500/50 p-6 rounded-3xl mb-6">
                <i data-lucide="shield-alert" class="text-red-500 mx-auto mb-3" size="32"></i>
                <h2 class="text-xl font-bold text-red-500 mb-2">通信エラー</h2>
                <p id="error-msg" class="text-slate-300 text-sm italic mb-4 font-mono"></p>
                <div class="text-[10px] text-slate-400 text-left bg-black/30 p-2 rounded">
                    解決策:<br>
                    1. 広告ブロックをオフにする<br>
                    2. ブラウザを更新する<br>
                    3. 通信環境を確認する
                </div>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-orange-500 rounded-2xl font-bold">再試行する</button>
        </div>

        <div id="user-card" class="hidden">
            <div class="bg-slate-800 p-8 rounded-[3rem] border border-white/5 text-center shadow-2xl">
                <div class="relative inline-block mb-6">
                    <img id="u-avatar" src="" class="w-32 h-32 rounded-[2.5rem] shadow-xl border-4 border-slate-700 bg-slate-900">
                    <div id="u-flag" class="absolute -bottom-2 -right-2 text-2xl bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg border border-slate-200">🏳️</div>
                </div>
                
                <h2 id="u-name" class="text-3xl font-black mb-1">---</h2>
                <p id="u-joined" class="text-slate-400 text-xs font-medium mb-6 uppercase tracking-widest">---</p>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] font-black text-orange-400 uppercase tracking-tighter mb-1">Followers</p>
                        <p id="u-followers" class="text-xl font-bold">---</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] font-black text-blue-400 uppercase tracking-tighter mb-1">Total Views</p>
                        <p id="u-views" class="text-xl font-bold">---</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const log = (m) => {
            const c = document.getElementById('log-content');
            c.innerHTML += `<div>> ${m}</div>`;
            console.log(m);
        };

        const params = new URLSearchParams(window.location.search);
        const username = params.get('u');

        async function init() {
            if (!username) {
                log("Error: No username provided");
                return;
            }

            log(`Target: ${username}`);
            log(`Attempting Scratch API...`);

            try {
                // Fetch with no extra headers to avoid CORS/Blocker issues
                const res = await fetch(`https://api.scratch.mit.edu/users/${username}`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!res.ok) {
                    throw new Error(`API Status: ${res.status}`);
                }

                const data = await res.json();
                log(`Success! User ID: ${data.id}`);

                // Basic Info Update
                document.getElementById('u-name').textContent = data.username;
                document.getElementById('u-avatar').src = `https://uploads.scratch.mit.edu/get_image/user/${data.id}_90x90.png`;
                document.getElementById('u-joined').textContent = `Joined ${data.history.joined.split('T')[0]}`;
                document.getElementById('debug-status').textContent = "Basic Loaded";

                // ScratchDB Stats Update
                log(`Attempting ScratchDB...`);
                try {
                    const dbRes = await fetch(`https://scratchdb.lefty.one/v3/user/info/${username}`);
                    if (dbRes.ok) {
                        const dbData = await dbRes.json();
                        document.getElementById('u-followers').textContent = dbData.statistics.followers.toLocaleString();
                        document.getElementById('u-views').textContent = dbData.statistics.views.toLocaleString();
                        log("Stats Loaded.");
                    } else {
                        log("ScratchDB unavailable.");
                    }
                } catch (e) {
                    log("ScratchDB blocked/failed.");
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('user-card').classList.remove('hidden');
                lucide.createIcons();

            } catch (err) {
                log(`Failed: ${err.message}`);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-view').classList.remove('hidden');
                document.getElementById('error-msg').textContent = err.message;
            }
        }

        init();
    </script>
</body>
</html>
