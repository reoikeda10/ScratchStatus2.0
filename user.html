<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - ScratchStats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: sans-serif; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <a href="index.html" class="inline-block mb-6 text-orange-500 font-bold">← 戻る</a>

        <!-- ローディング表示 -->
        <div id="loading" class="text-center py-20">
            <p class="text-lg animate-pulse">読み込み中...</p>
        </div>

        <!-- エラー表示 -->
        <div id="error" class="hidden text-center py-10">
            <h2 class="text-xl font-bold text-red-500 mb-2">ユーザーが見つかりません</h2>
            <p class="text-sm text-slate-500 mb-4">名前が正しいか確認してください。</p>
            <button onclick="location.reload()" class="bg-slate-200 px-4 py-2 rounded">再試行</button>
        </div>

        <!-- メインコンテンツ -->
        <div id="content" class="hidden">
            <div class="card text-center mb-4">
                <img id="u-avatar" src="" class="w-24 h-24 rounded-2xl mx-auto mb-4 border-4 border-white shadow">
                <h1 id="u-name" class="text-2xl font-black">---</h1>
                <p id="u-country" class="text-slate-400 text-sm mb-4">---</p>
                
                <div class="grid grid-cols-2 gap-2 mt-6">
                    <div class="bg-orange-50 p-4 rounded-xl">
                        <p class="text-[10px] font-bold text-orange-400 uppercase">Followers</p>
                        <p id="u-followers" class="text-lg font-bold">---</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <p class="text-[10px] font-bold text-blue-400 uppercase">Views</p>
                        <p id="u-views" class="text-lg font-bold">---</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2 class="font-bold mb-2">自己紹介</h2>
                <p id="u-bio" class="text-sm text-slate-600 whitespace-pre-wrap">---</p>
            </div>
        </div>
        
        <!-- 技術的なログ (問題解決用) -->
        <div id="debug" class="mt-10 p-4 bg-slate-800 text-white text-[10px] font-mono rounded overflow-x-auto">
            <div>Log:</div>
        </div>
    </div>

    <script>
        const log = (m) => { document.getElementById('debug').innerHTML += `<div>> ${m}</div>`; };
        const params = new URLSearchParams(window.location.search);
        const username = params.get('u');

        async function load() {
            if (!username) {
                log("No username in URL");
                return;
            }

            log(`Searching: ${username}`);
            
            try {
                // 1. 基本情報取得 (公式API)
                // キャッシュ回避のため ?t=タイムスタンプ を付与
                const res1 = await fetch(`https://api.scratch.mit.edu/users/${username}?t=${Date.now()}`);
                if (!res1.ok) throw new Error("User not found on Scratch");
                
                const data1 = await res1.json();
                log("Found on Official API");

                document.getElementById('u-name').textContent = data1.username;
                document.getElementById('u-avatar').src = `https://uploads.scratch.mit.edu/get_image/user/${data1.id}_90x90.png`;
                document.getElementById('u-country').textContent = data1.profile.country || "Unknown Country";
                document.getElementById('u-bio').textContent = data1.profile.bio || "No bio.";

                // 2. 統計情報取得 (ScratchDB)
                try {
                    const res2 = await fetch(`https://scratchdb.lefty.one/v3/user/info/${username}`);
                    if (res2.ok) {
                        const data2 = await res2.json();
                        document.getElementById('u-followers').textContent = data2.statistics.followers.toLocaleString();
                        document.getElementById('u-views').textContent = data2.statistics.views.toLocaleString();
                        log("Stats loaded from ScratchDB");
                    } else {
                        log("ScratchDB response error");
                    }
                } catch (e) {
                    log("ScratchDB connection failed");
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                log(`Error: ${err.message}`);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        window.onload = load;
    </script>
</body>
</html>
